<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facundo Villega — In Preparation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Times New Roman', Times, serif;
      background: #fff;
      color: #111;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 24px 80px;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    header {
      margin-bottom: 48px;
    }

    h1 {
      font-size: 1.15rem;
      font-weight: normal;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .tagline {
      font-size: 0.95rem;
      line-height: 1.55;
      color: #111;
      font-style: italic;
    }

    hr {
      border: none;
      border-top: 1px solid #111;
      margin: 36px 0;
    }

    section {
      margin-bottom: 40px;
    }

    .section-label {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 18px;
    }

    p.body-text {
      font-size: 0.95rem;
      line-height: 1.6;
    }

    a {
      color: #111;
      text-decoration: none;
      border-bottom: 1px solid #111;
    }

    a:hover {
      color: #555;
      border-bottom-color: #555;
    }

    footer {
      margin-top: 56px;
      font-size: 0.78rem;
      color: #888;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <h1>Facundo Villega</h1>
      <p class="tagline">Research on decentralized financial systems,<br>market concentration, and protocol design.</p>
    </header>

    <hr>

    <section>
      <p class="section-label">In Preparation</p>
      <p class="body-text">This paper is currently under revision. Return to the <a href="https://facundovillega.github.io/">research index</a> in the meantime.</p>
    </section>

    <hr>

    <footer>
      Buenos Aires, 2026
    </footer>

  </div>
</body>
</html>
